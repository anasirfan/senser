<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SenseR - Complete Store Visibility</title>
  <link rel="icon" id="favicon" type="image/svg+xml" href="/favicon/light.svg">
  <script>
    (function() {
      var q = window.matchMedia('(prefers-color-scheme: dark)');
      function set(e) {
        document.getElementById('favicon').href = e.matches ? '/favicon/dark.svg' : '/favicon/light.svg';
      }
      set(q);
      q.addEventListener('change', set);
    })();
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
